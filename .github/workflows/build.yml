name: Generar APK de Mis Finanzas
on:
  push:
    branches: [ main ] # Se activa cada vez que subes cambios a la rama principal

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Instalar dependencias de Python
        run: |
          pip install flet pandas openpyxl

      - name: 🏗️ Construir el APK
        run: |
         flet build apk

      - name: 📤 Guardar el APK final
        uses: actions/upload-artifact@v4
        with:
          name: AppFinanzas-Android
          path: build/apk/*.apk
